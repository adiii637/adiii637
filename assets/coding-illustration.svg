<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 400" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="600" y2="400" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#0D1117"/>
      <stop offset="100%" stop-color="#161B22"/>
    </linearGradient>
    <linearGradient id="accent" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#A78BFA"/>
      <stop offset="100%" stop-color="#6366F1"/>
    </linearGradient>
    <linearGradient id="glow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#A78BFA" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#A78BFA" stop-opacity="0"/>
    </linearGradient>
    <filter id="shadow" x="-10%" y="-10%" width="120%" height="120%">
      <feDropShadow dx="0" dy="4" stdDeviation="8" flood-color="#A78BFA" flood-opacity="0.25"/>
    </filter>
    <filter id="glow-filter">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="600" height="400" rx="20" fill="url(#bg)"/>

  <!-- Ambient glow -->
  <ellipse cx="300" cy="200" rx="200" ry="150" fill="url(#glow)" opacity="0.4">
    <animate attributeName="opacity" values="0.3;0.5;0.3" dur="4s" repeatCount="indefinite"/>
  </ellipse>

  <!-- Monitor -->
  <rect x="140" y="50" width="320" height="210" rx="12" fill="#1C2333" stroke="#30363D" stroke-width="2" filter="url(#shadow)"/>

  <!-- Screen -->
  <rect x="150" y="60" width="300" height="180" rx="6" fill="#0D1117"/>

  <!-- Window controls -->
  <circle cx="170" cy="76" r="5" fill="#FF5F57"/>
  <circle cx="186" cy="76" r="5" fill="#FEBD2F"/>
  <circle cx="202" cy="76" r="5" fill="#28C840"/>

  <!-- Code lines with typing animation -->
  <g opacity="0.9">
    <!-- Line 1 -->
    <text x="170" y="105" font-family="monospace" font-size="11" fill="#C678DD">const</text>
    <text x="210" y="105" font-family="monospace" font-size="11" fill="#E06C75"> developer</text>
    <text x="290" y="105" font-family="monospace" font-size="11" fill="#ABB2BF"> = {</text>

    <!-- Line 2 -->
    <text x="186" y="122" font-family="monospace" font-size="11" fill="#E06C75">name</text>
    <text x="218" y="122" font-family="monospace" font-size="11" fill="#ABB2BF">:</text>
    <text x="228" y="122" font-family="monospace" font-size="11" fill="#98C379">"Aditya Raj"</text>
    <text x="320" y="122" font-family="monospace" font-size="11" fill="#ABB2BF">,</text>

    <!-- Line 3 -->
    <text x="186" y="139" font-family="monospace" font-size="11" fill="#E06C75">stack</text>
    <text x="222" y="139" font-family="monospace" font-size="11" fill="#ABB2BF">:</text>
    <text x="232" y="139" font-family="monospace" font-size="11" fill="#98C379">"MERN"</text>
    <text x="275" y="139" font-family="monospace" font-size="11" fill="#ABB2BF">,</text>

    <!-- Line 4 -->
    <text x="186" y="156" font-family="monospace" font-size="11" fill="#E06C75">passion</text>
    <text x="238" y="156" font-family="monospace" font-size="11" fill="#ABB2BF">:</text>
    <text x="248" y="156" font-family="monospace" font-size="11" fill="#98C379">"Building"</text>
    <text x="320" y="156" font-family="monospace" font-size="11" fill="#ABB2BF">,</text>

    <!-- Line 5 -->
    <text x="186" y="173" font-family="monospace" font-size="11" fill="#E06C75">ai</text>
    <text x="202" y="173" font-family="monospace" font-size="11" fill="#ABB2BF">:</text>
    <text x="212" y="173" font-family="monospace" font-size="11" fill="#D19A66">true</text>
    <text x="238" y="173" font-family="monospace" font-size="11" fill="#ABB2BF">,</text>

    <!-- Line 6 -->
    <text x="186" y="190" font-family="monospace" font-size="11" fill="#61AFEF">coffee</text>
    <text x="228" y="190" font-family="monospace" font-size="11" fill="#ABB2BF">:</text>
    <text x="238" y="190" font-family="monospace" font-size="11" fill="#D19A66">Infinity</text>

    <!-- Line 7 -->
    <text x="170" y="207" font-family="monospace" font-size="11" fill="#ABB2BF">};</text>
  </g>

  <!-- Blinking cursor -->
  <rect x="288" y="197" width="8" height="14" fill="#A78BFA">
    <animate attributeName="opacity" values="1;0;1" dur="1.2s" repeatCount="indefinite"/>
  </rect>

  <!-- Monitor stand -->
  <rect x="270" y="260" width="60" height="15" rx="2" fill="#30363D"/>
  <rect x="250" y="275" width="100" height="6" rx="3" fill="#30363D"/>

  <!-- Floating elements -->
  <!-- React logo -->
  <g transform="translate(80, 100)" opacity="0.7">
    <circle cx="0" cy="0" r="6" fill="none" stroke="#61DAFB" stroke-width="1.5"/>
    <ellipse cx="0" cy="0" rx="18" ry="7" fill="none" stroke="#61DAFB" stroke-width="1" transform="rotate(0)">
      <animateTransform attributeName="transform" type="rotate" from="0" to="360" dur="8s" repeatCount="indefinite"/>
    </ellipse>
    <ellipse cx="0" cy="0" rx="18" ry="7" fill="none" stroke="#61DAFB" stroke-width="1" transform="rotate(60)">
      <animateTransform attributeName="transform" type="rotate" from="60" to="420" dur="8s" repeatCount="indefinite"/>
    </ellipse>
    <ellipse cx="0" cy="0" rx="18" ry="7" fill="none" stroke="#61DAFB" stroke-width="1" transform="rotate(120)">
      <animateTransform attributeName="transform" type="rotate" from="120" to="480" dur="8s" repeatCount="indefinite"/>
    </ellipse>
    <animate attributeName="opacity" values="0.5;0.8;0.5" dur="3s" repeatCount="indefinite"/>
  </g>

  <!-- Node.js icon -->
  <g transform="translate(520, 130)" opacity="0.6">
    <polygon points="0,-16 14,8 -14,8" fill="none" stroke="#339933" stroke-width="1.5"/>
    <animate attributeName="opacity" values="0.4;0.7;0.4" dur="4s" repeatCount="indefinite"/>
  </g>

  <!-- MongoDB leaf -->
  <g transform="translate(100, 280)" opacity="0.5">
    <path d="M0,-15 C8,-10 8,5 0,15 C-8,5 -8,-10 0,-15Z" fill="none" stroke="#4EA94B" stroke-width="1.5"/>
    <animate attributeName="opacity" values="0.3;0.6;0.3" dur="5s" repeatCount="indefinite"/>
  </g>

  <!-- Git branch -->
  <g transform="translate(510, 280)" opacity="0.5">
    <circle cx="0" cy="-10" r="4" fill="none" stroke="#F05032" stroke-width="1.5"/>
    <circle cx="0" cy="10" r="4" fill="none" stroke="#F05032" stroke-width="1.5"/>
    <line x1="0" y1="-6" x2="0" y2="6" stroke="#F05032" stroke-width="1.5"/>
    <animate attributeName="opacity" values="0.3;0.6;0.3" dur="3.5s" repeatCount="indefinite"/>
  </g>

  <!-- Decorative particles -->
  <circle cx="50" cy="50" r="2" fill="#A78BFA" opacity="0.4">
    <animate attributeName="cy" values="50;40;50" dur="3s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.2;0.6;0.2" dur="3s" repeatCount="indefinite"/>
  </circle>
  <circle cx="550" cy="60" r="1.5" fill="#6366F1" opacity="0.3">
    <animate attributeName="cy" values="60;48;60" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="0.1;0.5;0.1" dur="4s" repeatCount="indefinite"/>
  </circle>
  <circle cx="530" cy="350" r="2" fill="#A78BFA" opacity="0.3">
    <animate attributeName="cy" values="350;340;350" dur="3.5s" repeatCount="indefinite"/>
  </circle>
  <circle cx="70" cy="350" r="1.5" fill="#6366F1" opacity="0.3">
    <animate attributeName="cy" values="350;342;350" dur="2.8s" repeatCount="indefinite"/>
  </circle>

  <!-- Keyboard hints -->
  <g transform="translate(180, 320)" opacity="0.35">
    <rect x="0" y="0" width="240" height="50" rx="8" fill="#161B22" stroke="#30363D" stroke-width="1"/>
    <rect x="10" y="8" width="24" height="16" rx="3" fill="#21262D" stroke="#30363D" stroke-width="0.5"/>
    <rect x="38" y="8" width="24" height="16" rx="3" fill="#21262D" stroke="#30363D" stroke-width="0.5"/>
    <rect x="66" y="8" width="24" height="16" rx="3" fill="#21262D" stroke="#30363D" stroke-width="0.5"/>
    <rect x="94" y="8" width="24" height="16" rx="3" fill="#21262D" stroke="#30363D" stroke-width="0.5"/>
    <rect x="122" y="8" width="24" height="16" rx="3" fill="#21262D" stroke="#30363D" stroke-width="0.5"/>
    <rect x="150" y="8" width="24" height="16" rx="3" fill="#21262D" stroke="#30363D" stroke-width="0.5"/>
    <rect x="178" y="8" width="24" height="16" rx="3" fill="#21262D" stroke="#30363D" stroke-width="0.5"/>
    <rect x="206" y="8" width="24" height="16" rx="3" fill="#21262D" stroke="#30363D" stroke-width="0.5"/>
    <rect x="20" y="30" width="200" height="14" rx="3" fill="#21262D" stroke="#30363D" stroke-width="0.5"/>
  </g>
</svg>
